<!DOCTYPE html>
<html>
<head><title>Generate VisionaryAI Icons</title></head>
<body>
<p>Open this file in your browser, then click the button to download PNG icons.</p>
<button onclick="generateAll()">Generate & Download Icons</button>
<div id="canvases"></div>
<script>
function drawIcon(size) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background rounded rect
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Orange gradient background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, "#ff6b35");
  grad.addColorStop(1, "#ff4500");
  ctx.fillStyle = grad;
  ctx.fill();

  // Microphone icon (white)
  ctx.fillStyle = "white";
  ctx.strokeStyle = "white";
  ctx.lineWidth = size * 0.07;
  ctx.lineCap = "round";

  const cx = size / 2;
  const micW  = size * 0.22;
  const micH  = size * 0.30;
  const micTop = size * 0.18;
  const micR  = micW / 2;

  // Mic body
  ctx.beginPath();
  ctx.roundRect(cx - micW/2, micTop, micW, micH, micR);
  ctx.fill();

  // Mic arc
  ctx.beginPath();
  ctx.arc(cx, micTop + micH, size * 0.24, Math.PI, 0);
  ctx.stroke();

  // Mic stand line
  ctx.beginPath();
  ctx.moveTo(cx, micTop + micH + size * 0.24);
  ctx.lineTo(cx, size * 0.83);
  ctx.stroke();

  // Base line
  ctx.beginPath();
  ctx.moveTo(cx - size * 0.18, size * 0.83);
  ctx.lineTo(cx + size * 0.18, size * 0.83);
  ctx.stroke();

  return canvas;
}

function generateAll() {
  [16, 48, 128].forEach(size => {
    const canvas = drawIcon(size);
    const link = document.createElement("a");
    link.download = `icon${size}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>
</body>
</html>
