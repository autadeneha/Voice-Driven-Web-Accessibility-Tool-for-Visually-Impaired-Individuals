<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisionaryAI — Voice Test</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0d1b2a; color: #e2e8f0; padding: 24px; max-width: 700px; }
  h2   { color: #00c9a7; }
  .btn { background: #00c9a7; color: #000; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; font-weight: 700; }
  .btn:hover { background: #00a88c; }
  .btn.red  { background: #ef4444; color: #fff; }
  .voice-list { background: #112233; border-radius: 10px; padding: 14px; margin: 16px 0; font-size: 13px; }
  .voice-row  { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .voice-row.hi { color: #fbbf24; }
  .voice-row.mr { color: #60a5fa; }
  .voice-row.en { color: #6ee7b7; }
  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:700; margin-left:8px; }
  .badge.hi { background:rgba(251,191,36,.2); color:#fbbf24; }
  .badge.mr { background:rgba(96,165,250,.2); color:#60a5fa; }
  .badge.en { background:rgba(110,231,183,.2); color:#6ee7b7; }
  #status { color: #a78bfa; margin: 10px 0; min-height: 24px; }
  textarea { width:100%; background:#1e3a5f; border:1px solid #334155; border-radius:8px; color:#e2e8f0; padding:10px; font-size:14px; }
</style>
</head>
<body>
<h2>🔊 VisionaryAI — Voice Tester</h2>
<p>Use this to verify Hindi and Marathi voices work on your system.</p>

<div id="status">Loading voices...</div>

<div class="voice-list" id="voice-list">Detecting voices...</div>

<h3>Test Buttons</h3>
<button class="btn" onclick="testEnglish()">▶ Test English</button>
<button class="btn" onclick="testHindi()">▶ Test Hindi (हिंदी)</button>
<button class="btn" onclick="testMarathi()">▶ Test Marathi (मराठी)</button>
<button class="btn red" onclick="stopAll()">⏹ Stop</button>

<h3>Custom Text</h3>
<textarea id="custom-text" rows="3">नमस्ते। यह एक परीक्षण है।</textarea><br>
<select id="lang-select" style="background:#1e3a5f;color:#e2e8f0;border:1px solid #334155;padding:6px;border-radius:6px;margin:6px 0;">
  <option value="en-US">English (en-US)</option>
  <option value="hi-IN" selected>Hindi (hi-IN)</option>
  <option value="mr-IN">Marathi (mr-IN)</option>
</select>
<button class="btn" onclick="testCustom()">▶ Speak Custom Text</button>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (!voices.length) { setTimeout(loadVoices, 300); return; }

  const hindi   = voices.filter(v => v.lang.toLowerCase().startsWith('hi'));
  const marathi = voices.filter(v => v.lang.toLowerCase().startsWith('mr'));
  const english = voices.filter(v => v.lang.toLowerCase().startsWith('en'));

  document.getElementById('status').textContent =
    `✅ ${voices.length} total voices | ${hindi.length} Hindi | ${marathi.length} Marathi | ${english.length} English`;

  let html = '';
  if (hindi.length) {
    html += '<div style="color:#fbbf24;font-weight:700;margin-bottom:6px;">🟡 Hindi Voices</div>';
    hindi.forEach(v => html += `<div class="voice-row hi">${v.name} <span class="badge hi">${v.lang}</span>${v.localService?'<span class="badge en">local</span>':''}</div>`);
  } else {
    html += '<div style="color:#ef4444;">❌ No Hindi voices installed.<br>Go to: Windows Settings → Time & Language → Speech → Add voice → Hindi (India)</div>';
  }
  html += '<br>';
  if (marathi.length) {
    html += '<div style="color:#60a5fa;font-weight:700;margin-bottom:6px;">🔵 Marathi Voices</div>';
    marathi.forEach(v => html += `<div class="voice-row mr">${v.name} <span class="badge mr">${v.lang}</span>${v.localService?'<span class="badge en">local</span>':''}</div>`);
  } else {
    html += '<div style="color:#ef4444;">❌ No Marathi voices installed.<br>Go to: Windows Settings → Time & Language → Speech → Add voice → Marathi</div>';
  }
  html += '<br><div style="color:#6ee7b7;font-weight:700;margin-bottom:6px;">🟢 English Voices</div>';
  english.slice(0,5).forEach(v => html += `<div class="voice-row en">${v.name} <span class="badge en">${v.lang}</span></div>`);
  if (english.length > 5) html += `<div class="voice-row en">...and ${english.length-5} more</div>`;

  document.getElementById('voice-list').innerHTML = html;
}

function speak(text, lang) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  const v = voices.find(v => v.lang.toLowerCase() === lang.toLowerCase()) ||
            voices.find(v => v.lang.toLowerCase().startsWith(lang.slice(0,2).toLowerCase()));
  if (v) { u.voice = v; console.log('Using voice:', v.name, v.lang); }
  else console.warn('No voice found for', lang, '— using default');
  u.rate = 0.9; u.pitch = 1.0; u.volume = 1;
  speechSynthesis.speak(u);
  document.getElementById('status').textContent = '🔊 Speaking: ' + text.slice(0,50) + (v ? ' | Voice: '+v.name : ' | No matching voice');
}

function testEnglish()  { speak('Hello! This is VisionaryAI speaking in English. Read page command is working.', 'en-US'); }
function testHindi()    { speak('नमस्ते! मैं विज़नरी ए आई हूं। हिंदी में पढ़ना शुरू हो गया है।', 'hi-IN'); }
function testMarathi()  { speak('नमस्कार! मी विझनरी ए आय आहे. मराठीत वाचन सुरू झाले आहे.', 'mr-IN'); }
function stopAll()      { speechSynthesis.cancel(); document.getElementById('status').textContent = 'Stopped.'; }
function testCustom()   {
  const text = document.getElementById('custom-text').value;
  const lang = document.getElementById('lang-select').value;
  speak(text, lang);
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
</script>
</body>
</html>
